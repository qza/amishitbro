<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Am I Shit Bro?</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Screen system */
    .screen { display: none; width: 100%; max-width: 480px; padding: 32px 24px; }
    .screen.active { display: flex; flex-direction: column; align-items: center; }

    /* Landing */
    #screen-landing { text-align: center; gap: 16px; }

    .title {
      font-size: clamp(2.4rem, 10vw, 3.6rem);
      font-weight: 900;
      background: linear-gradient(90deg, #e96fff, #7bf1a8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #aaa;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      margin-bottom: 32px;
    }

    .btn-primary {
      display: inline-block;
      padding: 14px 40px;
      background: linear-gradient(90deg, #e96fff, #7bf1a8);
      border: none;
      border-radius: 40px;
      color: #0d0d1a;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: transform 0.15s, opacity 0.15s;
    }
    .btn-primary:hover { transform: scale(1.04); opacity: 0.92; }
    .btn-primary:active { transform: scale(0.97); }

    .donate-link {
      margin-top: 40px;
      color: #555;
      font-size: 0.8rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .donate-link:hover { color: #888; }

    /* Transitions */
    .screen.active {
      animation: fadeSlideIn 0.35s ease;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Quiz */
    #screen-quiz { gap: 0; padding: 24px 20px; justify-content: flex-start; }

    .quiz-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .quiz-counter { color: #555; font-size: 0.75rem; letter-spacing: 0.06em; }

    .badge {
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .badge-probably  { background: rgba(163, 230, 99, 0.15); color: #a8e063; }
    .badge-definitely { background: rgba(233, 111, 255, 0.15); color: #e96fff; }
    .badge-mirror { background: rgba(78, 205, 196, 0.15); color: #4ecdc4; }

    .progress-track {
      width: 100%;
      height: 3px;
      background: #1f2937;
      border-radius: 2px;
      margin-bottom: 36px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #e96fff, #7bf1a8);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .question-text {
      width: 100%;
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.45;
      color: #f0f0f0;
      margin-bottom: 32px;
      min-height: 80px;
      transition: opacity 0.15s;
    }

    .answer-btns {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-answer {
      width: 100%;
      padding: 14px 20px;
      border: 1px solid #2a2a3e;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      color: #e0e0e0;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .btn-answer:hover { background: rgba(255,255,255,0.07); border-color: #444; }
    .btn-answer:active { transform: scale(0.98); }
    .btn-answer.yes:hover { border-color: #e96fff; color: #e96fff; }
    .btn-answer.no:hover  { border-color: #7bf1a8; color: #7bf1a8; }

    /* Result */
    #screen-result {
      text-align: center;
      gap: 0;
      padding: 40px 24px;
    }

    .archetype-shape {
      width: 100px;
      height: 100px;
      margin: 0 auto 24px;
    }

    .shape-circle   { border-radius: 50%; }
    .shape-blob     { border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; }
    .shape-crescent { clip-path: path('M 50 0 A 50 50 0 1 0 50 100 A 30 30 0 1 1 50 0 Z'); }
    .shape-diamond  { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
    .shape-triangle { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
    .shape-polygon  { clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 90% 70%, 60% 100%, 40% 100%, 10% 70%, 0% 30%); }

    .archetype-name {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .score-line {
      color: #7bf1a8;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }

    .taglines {
      list-style: none;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .taglines li { color: #aaa; font-size: 0.9rem; line-height: 1.4; }

    .taste-section {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid #2a2a3e;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 28px;
      text-align: left;
    }
    .taste-section h3 {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: #555;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .taste-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 0.82rem; }
    .taste-label { color: #666; min-width: 64px; flex-shrink: 0; }
    .taste-value { color: #ccc; }

    .result-actions {
      display: flex;
      gap: 12px;
      width: 100%;
      margin-bottom: 24px;
    }
    .btn-save {
      flex: 1;
      padding: 13px;
      background: linear-gradient(90deg, #e96fff, #7bf1a8);
      border: none;
      border-radius: 12px;
      color: #0d0d1a;
      font-weight: 800;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-save:hover  { opacity: 0.88; }
    .btn-save:active { transform: scale(0.97); }

    .btn-retake {
      flex: 1;
      padding: 13px;
      background: transparent;
      border: 1px solid #2a2a3e;
      border-radius: 12px;
      color: #888;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-retake:hover { border-color: #555; color: #bbb; }

    .btn-sowhat {
      width: 100%;
      padding: 11px;
      background: transparent;
      border: 1px solid #333;
      border-radius: 40px;
      color: #555;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: border-color 0.2s, color 0.2s;
      margin-top: 4px;
    }
    .btn-sowhat:hover { border-color: #7bf1a8; color: #7bf1a8; }

    /* Profile */
    #screen-profile { gap: 0; padding: 40px 24px; text-align: center; }

    .profile-title {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #fff;
      margin-bottom: 6px;
    }

    .profile-subtitle {
      color: #555;
      font-size: 0.8rem;
      margin-bottom: 36px;
    }

    .profile-section {
      width: 100%;
      margin-bottom: 28px;
      text-align: left;
    }

    .profile-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      padding: 8px 18px;
      border: 1px solid #2a2a3e;
      border-radius: 24px;
      background: rgba(255,255,255,0.03);
      color: #888;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      user-select: none;
    }
    .pill:hover { border-color: #555; color: #ccc; }
    .pill.selected {
      border-color: #e96fff;
      color: #e96fff;
      background: rgba(233,111,255,0.1);
    }
    .pill.locked {
      border-color: #4ecdc4;
      color: #4ecdc4;
      background: rgba(78,205,196,0.1);
      cursor: default;
      opacity: 0.8;
    }

    .btn-letsgo {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #e96fff, #7bf1a8);
      border: none;
      border-radius: 40px;
      color: #0d0d1a;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: transform 0.15s, opacity 0.15s;
      margin-top: 8px;
    }
    .btn-letsgo:hover { transform: scale(1.02); opacity: 0.92; }
    .btn-letsgo:active { transform: scale(0.97); }
    .btn-letsgo:disabled {
      opacity: 0.25;
      cursor: not-allowed;
      transform: none;
    }
  </style>
</head>
<body>

  <!-- Screen 1: Landing -->
  <section id="screen-landing" class="screen active">
    <h1 class="title">AM I SHIT BRO?</h1>
    <p class="subtitle">30 questions. brutal truth. no cap.</p>
    <button class="btn-primary" onclick="startQuiz()">find out →</button>
    <a class="donate-link" href="https://ko-fi.com/PLACEHOLDER" target="_blank" rel="noopener">
      ☕ if this hits too hard, buy me a coffee
    </a>
  </section>

  <!-- Screen 2: Profile -->
  <section id="screen-profile" class="screen">
    <p class="profile-title">QUICK PROFILE</p>
    <p class="profile-subtitle">takes 2 seconds, affects your result</p>

    <div class="profile-section">
      <p class="profile-label">gender</p>
      <div class="pill-row" id="gender-pills">
        <button class="pill" data-value="male"   onclick="selectGender(this)">Male</button>
        <button class="pill" data-value="female" onclick="selectGender(this)">Female</button>
        <button class="pill" data-value="chaos"  onclick="selectGender(this)">Chaos</button>
      </div>
    </div>

    <div class="profile-section">
      <p class="profile-label">age</p>
      <div class="pill-row" id="age-pills">
        <button class="pill" data-value="young"     onclick="selectAge(this)">Young</button>
        <button class="pill" data-value="man-woman" onclick="selectAge(this)">Man/Woman</button>
        <button class="pill" data-value="kinda-old" onclick="selectAge(this)">Kinda old</button>
      </div>
    </div>

    <button class="btn-letsgo" id="btn-letsgo" onclick="beginQuiz()" disabled>let's go →</button>
  </section>

  <!-- Screen 2: Quiz (populated by JS) -->
  <section id="screen-quiz" class="screen">
    <div class="quiz-header">
      <span class="quiz-counter" id="quiz-counter">1 / 20</span>
      <span class="badge badge-probably" id="quiz-badge">PROBABLY</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <p class="question-text" id="question-text"></p>
    <div class="answer-btns" id="answer-btns"></div>
  </section>

  <!-- Screen 3: Result (populated by JS) -->
  <section id="screen-result" class="screen">
    <div class="archetype-shape" id="result-shape"></div>
    <h2 class="archetype-name" id="result-name"></h2>
    <p class="score-line" id="result-score"></p>
    <ul class="taglines" id="result-taglines">
      <li id="tagline-0"></li>
      <li id="tagline-1"></li>
      <li id="tagline-2"></li>
    </ul>
    <div class="taste-section">
      <h3>what it's like...</h3>
      <div class="taste-row">
        <span class="taste-label">as a friend</span>
        <span class="taste-value" id="taste-friend"></span>
      </div>
      <div class="taste-row">
        <span class="taste-label">at work</span>
        <span class="taste-value" id="taste-work"></span>
      </div>
      <div class="taste-row">
        <span class="taste-label">to date</span>
        <span class="taste-value" id="taste-date"></span>
      </div>
    </div>
    <div class="result-actions">
      <button class="btn-save" onclick="downloadCard()">⬇ save card</button>
      <button class="btn-retake" onclick="startQuiz()">retake</button>
    </div>
    <button class="btn-sowhat" onclick="showScreen('screen-closing')">so what? →</button>
    <a class="donate-link" href="https://ko-fi.com/PLACEHOLDER" target="_blank" rel="noopener">
      ☕ if this hit too hard, buy me a coffee
    </a>
  </section>

  <script>
    const QUESTIONS = [
      {
        text: "Do you collect Tarzans in the forest between anus hole and balls?",
        badge: "DEFINITELY",
        answers: [{ label: "yeah", score: 2 }, { label: "nah", score: 0 }]
      },
      {
        text: 'Have people told you "stop shitting on me"?',
        badge: "DEFINITELY",
        answers: [{ label: "yeah", score: 2 }, { label: "nah", score: 0 }]
      },
      {
        text: "Do you do that ass movement that lifts your back upward, ready to make shit?",
        badge: "PROBABLY",
        answers: [{ label: "yeah", score: 1 }, { label: "nah", score: 0 }]
      },
      {
        text: "Do you spin your head round making disgusted faces?",
        badge: "PROBABLY",
        answers: [{ label: "yeah", score: 1 }, { label: "nah", score: 0 }]
      },
      {
        text: "Did you ever get told to eat shit? Or is this not some city shit you know?",
        badge: "DEFINITELY",
        answers: [{ label: "yeah", score: 2 }, { label: "nah", score: 0 }]
      },
      {
        text: "Do you buy watches for all your friends and you're not a football player?",
        badge: "PROBABLY",
        answers: [{ label: "yeah", score: 1 }, { label: "nah", score: 0 }]
      },
      {
        text: 'Have you ever responded: "who gives a damn if you are shit or not?"',
        badge: "DEFINITELY",
        answers: [{ label: "yeah", score: 2 }, { label: "nah", score: 0 }]
      },
      {
        text: 'Do you say often: "stop looking at me you shit!"',
        badge: "MIRROR",
        answers: [{ label: "sometimes", score: -1 }, { label: "yes", score: 0 }, { label: "no", score: 2 }]
      },
      {
        text: "Do you often find material in your anus bag (hard to clean spot)?",
        badge: "MIRROR",
        answers: [{ label: "yeah", score: -1 }, { label: "nah", score: 1 }]
      },
      {
        text: "Are you aware that you are shit sometimes?",
        badge: "MIRROR",
        answers: [{ label: "yeah", score: -1 }, { label: "nah", score: 2 }]
      },
      {
        text: "Do you find that shit funny and tasty?",
        badge: "MIRROR",
        answers: [{ label: "yeah", score: -1 }, { label: "nah", score: 1 }]
      },
      {
        text: "Am I shit or you are shit?",
        badge: "MIRROR",
        answers: [{ label: "both", score: 0 }, { label: "you", score: -1 }, { label: "I", score: 2 }]
      },
      {
        text: "Do you keep a lot of shit in your iPhone or mobile?",
        badge: "PROBABLY",
        answers: [{ label: "yeah", score: 0 }, { label: "nah", score: 1 }]
      },
      {
        text: "Can you tell easily if somebody is a shit or not?",
        badge: "DEFINITELY",
        answers: [{ label: "yeah", score: 2 }, { label: "nah", score: 0 }]
      },
      {
        text: "Are you ready to go all white tonight? Party?",
        badge: "PROBABLY",
        answers: [{ label: "yeah", score: 1 }, { label: "nah", score: 0 }]
      },
      {
        text: "Do you think brown sugar is healthier than white sugar?",
        badge: "MIRROR",
        answers: [{ label: "same thing", score: 1 }, { label: "yeah", score: 0 }, { label: "nah", score: -1 }]
      },
      {
        text: 'Do you hear often: "well that is the shit of an argument"',
        badge: "MIRROR",
        answers: [{ label: "yeah", score: -1 }, { label: "nah", score: 1 }]
      },
      {
        text: 'Do you get sometimes: "hey, that is a secret you shit"',
        badge: "MIRROR",
        answers: [{ label: "yeah", score: -1 }, { label: "nah", score: 1 }]
      },
      {
        text: "Do you care at all about your shit friends?",
        badge: "MIRROR",
        answers: [{ label: "yeah", score: -1 }, { label: "can't tell", score: 0 }, { label: "nah", score: 1 }]
      },
      {
        text: "Do you ever say sorry you shit?",
        badge: "MIRROR",
        answers: [{ label: "yeah", score: 1 }, { label: "not like that", score: -1 }]
      },
    ];

    const ARCHETYPES = [
      {
        name: "THE DECENT ONE",
        min: -10, max: 2,
        color: "#7bf1a8",
        shape: "circle",
        taglines: [
          "wait, you're actually okay? 🤔",
          "your friends genuinely like you back",
          "rare species tbh, don't waste it"
        ],
        tastes: {
          friend: "weirdly reliable, refreshing",
          work: "the one who actually follows through",
          date: "boring in the best way possible"
        }
      },
      {
        name: "THE FLAKE",
        min: 3, max: 8,
        color: "#a8e063",
        shape: "blob",
        taglines: [
          "loveable but you can't count on them 🫠",
          "3 'omw' texts and still 40 mins away",
          "good intentions, chaotic execution"
        ],
        tastes: {
          friend: "fun when they show up",
          work: "perpetually 'almost done'",
          date: "exciting until they vanish for a week"
        }
      },
      {
        name: "THE GHOST",
        min: 9, max: 14,
        color: "#4ecdc4",
        shape: "crescent",
        taglines: [
          "present but not really there 👻",
          "people wonder if they imagined you",
          "your read receipts say more than you do"
        ],
        tastes: {
          friend: "low maintenance but also just... low",
          work: "shows up, contributes nothing, disappears",
          date: "emotionally unavailable starter pack"
        }
      },
      {
        name: "THE LEECH",
        min: 15, max: 19,
        color: "#e96fff",
        shape: "diamond",
        taglines: [
          "takes more than it gives 🩸",
          "your friends are tired but too nice to say",
          "energy vampire with good vibes as cover"
        ],
        tastes: {
          friend: "draining after 2 hours",
          work: "great at delegating their own work",
          date: "their needs > your needs, always"
        }
      },
      {
        name: "THE VOLCANO",
        min: 20, max: 24,
        color: "#ff6b6b",
        shape: "triangle",
        taglines: [
          "spicy to be around 🌶️",
          "your friends text in group chats about u",
          "a walking red flag parade tbh"
        ],
        tastes: {
          friend: "exhausting but never boring",
          work: "the one who derails standups",
          date: "a rollercoaster with no seatbelt"
        }
      },
      {
        name: "THE CHAOS AGENT",
        min: 25, max: 30,
        color: "#ff9a3c",
        shape: "polygon",
        taglines: [
          "pure entropy, certified shit 💀",
          "you leave situations worse than you found them",
          "people recover from knowing you"
        ],
        tastes: {
          friend: "a trauma bond waiting to happen",
          work: "HR has a folder with your name on it",
          date: "therapy material, no cap"
        }
      }
    ];

    function getArchetype(s) {
      return ARCHETYPES.find(a => s >= a.min && s <= a.max);
    }

    let currentQ = 0;
    let score = 0;

    let userProfile = { gender: null, age: null };

    function makePill(label, value, selected, handler) {
      const btn = document.createElement('button');
      btn.className = 'pill' + (selected ? ' selected' : '');
      btn.dataset.value = value;
      btn.textContent = label;
      btn.onclick = function() { handler(btn); };
      return btn;
    }

    function selectGender(pill) {
      document.querySelectorAll('#gender-pills .pill').forEach(function(p) {
        p.classList.remove('selected');
      });
      pill.classList.add('selected');
      userProfile = Object.assign({}, userProfile, { gender: pill.dataset.value });

      const agePills = document.getElementById('age-pills');

      if (userProfile.gender === 'chaos') {
        userProfile = Object.assign({}, userProfile, { age: 'middle-age' });
        agePills.replaceChildren();
        var locked = document.createElement('button');
        locked.className = 'pill locked';
        locked.textContent = 'Middle age \uD83D\uDE36';
        agePills.appendChild(locked);
      } else {
        if (userProfile.age === 'middle-age') { userProfile = Object.assign({}, userProfile, { age: null }); }
        agePills.replaceChildren(
          makePill('Young',       'young',     userProfile.age === 'young',     selectAge),
          makePill('Man/Woman',   'man-woman', userProfile.age === 'man-woman', selectAge),
          makePill('Kinda old',   'kinda-old', userProfile.age === 'kinda-old', selectAge)
        );
      }
      updateLetsGo();
    }

    function selectAge(pill) {
      document.querySelectorAll('#age-pills .pill').forEach(function(p) {
        p.classList.remove('selected');
      });
      pill.classList.add('selected');
      userProfile = Object.assign({}, userProfile, { age: pill.dataset.value });
      updateLetsGo();
    }

    function updateLetsGo() {
      document.getElementById('btn-letsgo').disabled = !(userProfile.gender && userProfile.age);
    }

    function beginQuiz() {
      currentQ = 0;
      score = 0;
      renderQuestion();
      showScreen('screen-quiz');
    }

    function startQuiz() {
      showScreen('screen-profile');
    }

    function renderQuestion() {
      var q     = QUESTIONS[currentQ];
      var total = QUESTIONS.length;

      var qText = document.getElementById('question-text');
      qText.style.opacity = '0';
      setTimeout(function() {
        qText.textContent = q.text;
        qText.style.opacity = '1';
      }, 150);

      document.getElementById('quiz-counter').textContent = (currentQ + 1) + ' / ' + total;
      document.getElementById('progress-fill').style.width = ((currentQ / total) * 100) + '%';

      var badgeMap = {
        'PROBABLY':   { text: 'PROBABLY',   cls: 'badge badge-probably'   },
        'DEFINITELY': { text: 'DEFINITELY', cls: 'badge badge-definitely' },
        'MIRROR':     { text: 'MIRROR',     cls: 'badge badge-mirror'     }
      };
      var b = badgeMap[q.badge] || badgeMap['PROBABLY'];
      var badge = document.getElementById('quiz-badge');
      badge.textContent = b.text;
      badge.className   = b.cls;

      var btns = document.getElementById('answer-btns');
      btns.replaceChildren();
      q.answers.forEach(function(a, i) {
        var btn = document.createElement('button');
        btn.className = 'btn-answer';
        btn.textContent = a.label;
        btn.onclick = function() { answer(i); };
        btns.appendChild(btn);
      });
    }

    function answer(idx) {
      score += QUESTIONS[currentQ].answers[idx].score;
      currentQ++;
      if (currentQ < QUESTIONS.length) {
        renderQuestion();
      } else {
        finaliseScore();
      }
    }

    function finaliseScore() {
      var multipliers = { male: 1.0, female: 1.5, chaos: 0.67 };
      var m = multipliers[userProfile.gender] || 1.0;
      score = Math.round(score * m);
      score = Math.max(-10, Math.min(30, score));
      showResult();
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function showResult() {
      const arch = getArchetype(score);

      const shape = document.getElementById('result-shape');
      shape.style.background = arch.color;
      shape.className = 'archetype-shape shape-' + arch.shape;

      const nameEl = document.getElementById('result-name');
      nameEl.textContent = arch.name;
      nameEl.style.color = arch.color;

      document.getElementById('result-score').textContent = 'SHIT SCORE: ' + score + ' / 30';

      document.getElementById('tagline-0').textContent = arch.taglines[0];
      document.getElementById('tagline-1').textContent = arch.taglines[1];
      document.getElementById('tagline-2').textContent = arch.taglines[2];

      document.getElementById('taste-friend').textContent = arch.tastes.friend;
      document.getElementById('taste-work').textContent   = arch.tastes.work;
      document.getElementById('taste-date').textContent   = arch.tastes.date;

      showScreen('screen-result');
    }

    function downloadCard() {
      const arch = getArchetype(score);
      const SIZE = 1080;
      const canvas = document.createElement('canvas');
      canvas.width = SIZE;
      canvas.height = SIZE;
      const ctx = canvas.getContext('2d');

      // Background gradient
      const bg = ctx.createLinearGradient(0, 0, SIZE, SIZE);
      bg.addColorStop(0, '#1a1a2e');
      bg.addColorStop(1, '#16213e');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, SIZE, SIZE);

      // Archetype shape — centred at top third
      const cx = SIZE / 2;
      const cy = 340;
      const r  = 150;
      ctx.fillStyle = arch.color;

      if (arch.shape === 'circle' || arch.shape === 'blob') {
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
      } else if (arch.shape === 'crescent') {
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#16213e';
        ctx.beginPath();
        ctx.arc(cx - 55, cy, r * 0.72, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = arch.color;
      } else if (arch.shape === 'diamond') {
        ctx.beginPath();
        ctx.moveTo(cx,     cy - r);
        ctx.lineTo(cx + r, cy);
        ctx.lineTo(cx,     cy + r);
        ctx.lineTo(cx - r, cy);
        ctx.closePath();
        ctx.fill();
      } else if (arch.shape === 'triangle') {
        ctx.beginPath();
        ctx.moveTo(cx,     cy - r);
        ctx.lineTo(cx + r, cy + r);
        ctx.lineTo(cx - r, cy + r);
        ctx.closePath();
        ctx.fill();
      } else if (arch.shape === 'polygon') {
        const offsets = [0.3, 0.7, 1.0, 0.9, 0.7, 0.4, 0.1, 0.0];
        ctx.beginPath();
        offsets.forEach((v, i) => {
          const angle = (i / offsets.length) * Math.PI * 2 - Math.PI / 2;
          const pr = r * (0.7 + v * 0.3);
          const x = cx + Math.cos(angle) * pr;
          const y = cy + Math.sin(angle) * pr;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.closePath();
        ctx.fill();
      }

      // Archetype name
      ctx.fillStyle  = arch.color;
      ctx.font       = '900 72px -apple-system, BlinkMacSystemFont, Arial, sans-serif';
      ctx.textAlign  = 'center';
      ctx.fillText(arch.name, SIZE / 2, 570);

      // Score
      ctx.fillStyle = '#7bf1a8';
      ctx.font      = '600 36px -apple-system, BlinkMacSystemFont, Arial, sans-serif';
      ctx.fillText('SHIT SCORE: ' + score + ' / 30', SIZE / 2, 630);

      // Taglines
      ctx.fillStyle = '#aaaaaa';
      ctx.font      = '400 32px -apple-system, BlinkMacSystemFont, Arial, sans-serif';
      arch.taglines.forEach(function(line, i) {
        ctx.fillText(line, SIZE / 2, 710 + i * 52);
      });

      // Watermark
      ctx.fillStyle  = '#333';
      ctx.font       = '400 24px -apple-system, BlinkMacSystemFont, Arial, sans-serif';
      ctx.textAlign  = 'right';
      ctx.fillText('amishitbro.com', SIZE - 40, SIZE - 40);

      // Trigger download
      canvas.toBlob(function(blob) {
        const url = URL.createObjectURL(blob);
        const a   = document.createElement('a');
        a.href     = url;
        a.download = 'amishitbro-' + arch.name.toLowerCase().replace(/\s+/g, '-') + '.png';
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/png');
    }
  </script>
