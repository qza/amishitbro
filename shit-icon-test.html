<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shit Icon Test</title>
  <style>
    body {
      background: #1a1a2e;
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      padding: 40px;
      font-family: sans-serif;
      align-items: flex-end;
    }
    .label {
      color: #555;
      font-size: 0.7rem;
      text-align: center;
      margin-top: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .item { display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>
<script>
const COLORS = [
  { name: 'golden',  stops: ['#ffe066', '#c8860a'] },
  { name: 'brown',   stops: ['#a0522d', '#3b1a08'] },
  { name: 'noir',    stops: ['#444', '#111'] },
  { name: 'white',   stops: ['#fff', '#bbb'] },
];

const SIZES = [
  { name: 'big shiny shit',       w: 120, h: 140 },
  { name: 'pure shit',            w: 72,  h: 84  },
  { name: 'unbelievable shit',    w: 36,  h: 42  },
];

function drawShit(canvas, w, h, stops) {
  const ctx = canvas.getContext('2d');
  canvas.width  = w;
  canvas.height = h;
  ctx.clearRect(0, 0, w, h);

  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0,   stops[0]);
  grad.addColorStop(1,   stops[1]);

  // proportions relative to canvas
  const cx   = w / 2;
  const base = h;          // bottom of the base
  const bw   = w * 0.48;   // half-width of base

  // --- base tier (widest, flat bottom) ---
  ctx.beginPath();
  ctx.moveTo(cx - bw, base);
  ctx.lineTo(cx + bw, base);
  // right side curves up
  ctx.quadraticCurveTo(cx + bw * 1.12, base - h * 0.18, cx + bw * 0.72, base - h * 0.28);
  // left mirror
  ctx.quadraticCurveTo(cx - bw * 1.12, base - h * 0.18, cx - bw, base);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // --- middle tier ---
  const m1y = base - h * 0.25;
  const mw  = bw * 0.72;
  ctx.beginPath();
  ctx.ellipse(cx, m1y, mw, h * 0.17, 0, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // --- top tier (small) ---
  const m2y = base - h * 0.50;
  const tw  = bw * 0.44;
  ctx.beginPath();
  ctx.ellipse(cx, m2y, tw, h * 0.13, 0, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // --- top swirl tip ---
  const ty = base - h * 0.72;
  const sw = bw * 0.22;
  ctx.beginPath();
  ctx.ellipse(cx, ty, sw, h * 0.10, 0, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // pointy tip
  ctx.beginPath();
  ctx.moveTo(cx - sw * 0.5, ty);
  ctx.quadraticCurveTo(cx, ty - h * 0.16, cx + sw * 0.1, ty - h * 0.09);
  ctx.quadraticCurveTo(cx + sw * 0.6, ty + h * 0.02, cx - sw * 0.5, ty);
  ctx.fillStyle = grad;
  ctx.fill();

  // --- eyes ---
  const ey   = base - h * 0.34;
  const er   = w * 0.045;
  const eoff = mw * 0.38;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx - eoff, ey, er * 1.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + eoff, ey, er * 1.3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(cx - eoff + er * 0.2, ey, er * 0.7, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + eoff + er * 0.2, ey, er * 0.7, 0, Math.PI * 2); ctx.fill();

  // --- smile ---
  const sy = base - h * 0.27;
  ctx.beginPath();
  ctx.arc(cx, sy, mw * 0.28, 0.15, Math.PI - 0.15);
  ctx.strokeStyle = '#111';
  ctx.lineWidth   = w * 0.03;
  ctx.lineCap     = 'round';
  ctx.stroke();
}

SIZES.forEach(function(size) {
  COLORS.forEach(function(color) {
    const item   = document.createElement('div');
    item.className = 'item';
    const canvas = document.createElement('canvas');
    drawShit(canvas, size.w, size.h, color.stops);
    const lbl = document.createElement('div');
    lbl.className = 'label';
    lbl.textContent = color.name;
    item.appendChild(canvas);
    item.appendChild(lbl);
    document.body.appendChild(item);
  });
  // size label separator
  const sep = document.createElement('div');
  sep.style.cssText = 'width:100%;color:#333;font-size:0.65rem;font-family:sans-serif;letter-spacing:0.1em;padding-top:8px;';
  sep.textContent = '— ' + size.name + ' —';
  document.body.appendChild(sep);
});
</script>
</body>
</html>
