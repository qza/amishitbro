<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poo Post Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f5f0e8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 40px;
    }
    .card {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(135deg, #f9e4b7, #f7c59f);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      gap: 32px;
      box-shadow: 0 8px 40px rgba(92,61,17,0.15);
    }
    .emoji {
      font-size: 120px;
      line-height: 1;
    }
    .label {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #5c3d11;
      text-transform: uppercase;
      opacity: 0.7;
    }
    .fact {
      font-size: 42px;
      font-weight: 700;
      color: #5c3d11;
      text-align: center;
      line-height: 1.3;
      max-width: 880px;
    }
    .badge {
      background: #5c3d11;
      color: #f9e4b7;
      font-size: 20px;
      font-weight: 600;
      padding: 10px 28px;
      border-radius: 40px;
      letter-spacing: 1px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">💩</div>
    <div class="label">Poo Science</div>
    <div class="fact">{{FACT}}</div>
    <div class="badge">{{SITE_URL}}</div>
  </div>
</body>
</html>
